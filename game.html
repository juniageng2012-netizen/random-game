<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Collector Game - Cookie Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #3d2817;
            font-family: Arial, sans-serif;
            color: white;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 800px;
            background: linear-gradient(135deg, #8b5a2b 0%, #a0522d 50%, #8b6f47 100%);
            border: 3px solid #5c3d2e;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 0;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .grid-cell {
            position: relative;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, #8b5a2b 0%, #9d6b3d 100%);
        }

        .grid-cell:nth-child(even) {
            background: linear-gradient(135deg, #a0522d 0%, #8b6f47 100%);
        }

        .score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            border: 2px solid #d4a574;
        }

        .primogem-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            border-radius: 50%;
            border: 2px solid #fff;
            z-index: 50;
            transform: translate(-50%, -50%);
        }

        .primogem {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: float 0.6s ease-in-out infinite;
            z-index: 30;
            transform: translate(-50%, -50%);
        }

        @keyframes float {
            0%, 100% {
                transform: translate(-50%, -50%);
            }
            50% {
                transform: translate(-50%, calc(-50% - 5px));
            }
        }

        .meteor-warning {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: rgba(139, 69, 19, 0.4);
            border: 2px solid rgba(210, 105, 30, 0.8);
            z-index: 20;
            animation: pulse-warning 0.5s ease-in-out infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse-warning {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        .meteor {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #d2691e 0%, #8b4513 50%, #5c2e0f 100%);
            border-radius: 50%;
            z-index: 40;
            box-shadow: 
                0 0 20px rgba(210, 105, 30, 0.8),
                inset -2px -2px 5px rgba(0, 0, 0, 0.5),
                inset 2px 2px 5px rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
        }

        /* Chocolate chip details on cookie */
        .meteor::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, #3d2817 8px, transparent 8px),
                radial-gradient(circle, #3d2817 5px, transparent 5px),
                radial-gradient(circle, #3d2817 6px, transparent 6px),
                radial-gradient(circle, #3d2817 7px, transparent 7px),
                radial-gradient(circle, #3d2817 5px, transparent 5px);
            background-position: 
                20px 20px,
                60px 30px,
                40px 60px,
                70px 70px,
                30px 70px;
            background-repeat: no-repeat;
            border-radius: 50%;
        }

        .paralyzed-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.3);
            z-index: 150;
            pointer-events: none;
            display: none;
        }

        .paralyzed-overlay.active {
            display: block;
        }

        .paralyzed-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 160;
            display: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .paralyzed-text.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="paralyzed-overlay" id="paralyzedOverlay"></div>
        <div class="paralyzed-text" id="paralyzedText">PARALYZED!</div>
        <div class="score-display">
            <div class="primogem-icon"></div>
            <span id="scoreValue">0</span>
        </div>
    </div>

    <script>
        // Game constants
        const GRID_SIZE = 20;
        const GRID_CELL_SIZE = 40; // 800px / 20 = 40px per cell
        const PLAYER_SPEED = 5; // grids per second
        const PRIMOGEM_SPAWN_INTERVAL = 3000; // 3 seconds
        const BASE_METEOR_SPAWN_INTERVAL = 7000; // 7 seconds (targeting meteors)
        const BASE_RANDOM_METEOR_SPAWN_INTERVAL = 10000; // 10 seconds (random meteors)
        const METEOR_WARNING_TIME = 3000; // 3 seconds before meteor lands
        const METEOR_SIZE = 3; // 3x3 grid
        const METEOR_HALF_SIZE = Math.floor(METEOR_SIZE / 2); // 1
        const COLLECTION_RADIUS = 0.3; // How close player needs to be to collect

        // Game state
        const game = {
            player: {
                gridX: 10,
                gridY: 10,
                velocityX: 0,
                velocityY: 0,
                isParalyzed: false,
                paralyzedTimeRemaining: 0
            },
            score: 0,
            primogems: [],
            meteors: [],
            meteorWarnings: [],
            keys: {},
            gameRunning: true,
            activeMeteorSpawners: {
                targeting1: true,
                targeting2: false,
                random1: true,
                random2: false
            }
        };

        const gameContainer = document.getElementById('gameContainer');
        const scoreValue = document.getElementById('scoreValue');
        const paralyzedOverlay = document.getElementById('paralyzedOverlay');
        const paralyzedText = document.getElementById('paralyzedText');

        // Create grid cells
        function createGrid() {
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gameContainer.appendChild(cell);
            }
        }

        // Update player visual position
        function updatePlayerDisplay() {
            let player = document.getElementById('playerElement');
            if (!player) {
                player = document.createElement('div');
                player.id = 'playerElement';
                player.className = 'player';
                gameContainer.appendChild(player);
            }
            // Center player on the grid position
            player.style.left = (game.player.gridX * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            player.style.top = (game.player.gridY * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
        }

        // Spawn primogem at random location (centered on grid)
        function spawnPrimogem() {
            const gridX = Math.floor(Math.random() * GRID_SIZE);
            const gridY = Math.floor(Math.random() * GRID_SIZE);
            const primogem = {
                id: Date.now() + Math.random(),
                gridX: gridX,
                gridY: gridY,
                element: null
            };
            game.primogems.push(primogem);
            createPrimosgemElement(primogem);
        }

        function createPrimosgemElement(primogem) {
            const element = document.createElement('div');
            element.className = 'primogem';
            // Center primogem on the grid position
            element.style.left = (primogem.gridX * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            element.style.top = (primogem.gridY * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            gameContainer.appendChild(element);
            primogem.element = element;
        }

        // Check if player collides with primogem
        function checkPrimosgemCollision() {
            for (let i = game.primogems.length - 1; i >= 0; i--) {
                const primogem = game.primogems[i];
                const distance = Math.sqrt(
                    Math.pow(game.player.gridX - primogem.gridX, 2) +
                    Math.pow(game.player.gridY - primogem.gridY, 2)
                );
                if (distance < COLLECTION_RADIUS) {
                    game.score++;
                    scoreValue.textContent = game.score;
                    primogem.element.remove();
                    game.primogems.splice(i, 1);
                    updateMeteorSpawners(); // Check if we need to unlock new meteor spawners
                }
            }
        }

        // Update which meteor spawners are active based on score
        function updateMeteorSpawners() {
            if (game.score >= 30 && !game.activeMeteorSpawners.targeting2) {
                game.activeMeteorSpawners.targeting2 = true;
            }
            if (game.score >= 50 && !game.activeMeteorSpawners.random2) {
                game.activeMeteorSpawners.random2 = true;
            }
        }

        // Get dynamic spawn interval based on score
        function getTargetingMeteorInterval() {
            if (game.score >= 50) return 5000; // 5 seconds at 50+ points
            if (game.score >= 30) return 5500; // 5.5 seconds at 30+ points
            return BASE_METEOR_SPAWN_INTERVAL; // 7 seconds default
        }

        function getRandomMeteorInterval() {
            if (game.score >= 50) return 8000; // 8 seconds at 50+ points
            return BASE_RANDOM_METEOR_SPAWN_INTERVAL; // 10 seconds default
        }

        // Spawn targeting meteor (locks onto player position)
        function spawnTargetingMeteor() {
            // Target the player's current position
            let gridX = Math.round(game.player.gridX);
            let gridY = Math.round(game.player.gridY);

            // Clamp to valid grid positions
            gridX = Math.max(0, Math.min(GRID_SIZE - 1, gridX));
            gridY = Math.max(0, Math.min(GRID_SIZE - 1, gridY));

            const meteor = {
                id: Date.now() + Math.random(),
                gridX: gridX,
                gridY: gridY,
                warningElement: null,
                meteorElement: null,
                hasLanded: false,
                isRandom: false
            };

            // Create warning indicator (3x3 square centered on player)
            const warningElement = document.createElement('div');
            warningElement.className = 'meteor-warning';
            warningElement.style.left = (gridX * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            warningElement.style.top = (gridY * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            gameContainer.appendChild(warningElement);
            meteor.warningElement = warningElement;

            game.meteorWarnings.push(meteor);

            // Schedule meteor to land
            setTimeout(() => {
                landMeteor(meteor);
            }, METEOR_WARNING_TIME);
        }

        // Spawn random meteor (no targeting)
        function spawnRandomMeteor() {
            // Random position on the grid
            let gridX = Math.floor(Math.random() * GRID_SIZE);
            let gridY = Math.floor(Math.random() * GRID_SIZE);

            const meteor = {
                id: Date.now() + Math.random(),
                gridX: gridX,
                gridY: gridY,
                warningElement: null,
                meteorElement: null,
                hasLanded: false,
                isRandom: true
            };

            // Create warning indicator (3x3 square at random location)
            const warningElement = document.createElement('div');
            warningElement.className = 'meteor-warning';
            warningElement.style.left = (gridX * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            warningElement.style.top = (gridY * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            gameContainer.appendChild(warningElement);
            meteor.warningElement = warningElement;

            game.meteorWarnings.push(meteor);

            // Schedule meteor to land
            setTimeout(() => {
                landMeteor(meteor);
            }, METEOR_WARNING_TIME);
        }

        function landMeteor(meteor) {
            // Remove warning
            if (meteor.warningElement) {
                meteor.warningElement.remove();
            }

            // Move to active meteors
            const index = game.meteorWarnings.indexOf(meteor);
            if (index > -1) {
                game.meteorWarnings.splice(index, 1);
            }
            game.meteors.push(meteor);
            meteor.hasLanded = true;

            // Create meteor visual (3x3 square centered on target)
            const meteorElement = document.createElement('div');
            meteorElement.className = 'meteor';
            meteorElement.style.left = (meteor.gridX * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            meteorElement.style.top = (meteor.gridY * GRID_CELL_SIZE + GRID_CELL_SIZE / 2) + 'px';
            gameContainer.appendChild(meteorElement);
            meteor.meteorElement = meteorElement;

            // Check collision
            checkMeteorCollision(meteor);

            // Remove meteor after a short time
            setTimeout(() => {
                if (meteor.meteorElement) {
                    meteor.meteorElement.remove();
                }
                const idx = game.meteors.indexOf(meteor);
                if (idx > -1) {
                    game.meteors.splice(idx, 1);
                }
            }, 1000);
        }

        function checkMeteorCollision(meteor) {
            // Check if player is in the 3x3 meteor impact area
            const meteorStartX = meteor.gridX - METEOR_HALF_SIZE;
            const meteorStartY = meteor.gridY - METEOR_HALF_SIZE;
            const meteorEndX = meteorStartX + METEOR_SIZE;
            const meteorEndY = meteorStartY + METEOR_SIZE;

            // Round player position to check grid cell
            const playerGridX = Math.round(game.player.gridX);
            const playerGridY = Math.round(game.player.gridY);

            if (
                playerGridX >= meteorStartX &&
                playerGridX < meteorEndX &&
                playerGridY >= meteorStartY &&
                playerGridY < meteorEndY
            ) {
                applyMeteorDamage();
            }
        }

        function applyMeteorDamage() {
            let paralyzeDuration;
            let pointsLost;

            if (game.score <= 10) {
                paralyzeDuration = 1000;
                pointsLost = 1;
            } else if (game.score <= 20) {
                paralyzeDuration = 2000;
                pointsLost = 3;
            } else if (game.score <= 50) {
                paralyzeDuration = 3000;
                pointsLost = 5;
            } else {
                paralyzeDuration = 5000;
                pointsLost = 7;
            }

            // Apply paralysis
            game.player.isParalyzed = true;
            game.player.paralyzedTimeRemaining = paralyzeDuration;
            game.player.velocityX = 0;
            game.player.velocityY = 0;

            // Show paralyzed overlay
            paralyzedOverlay.classList.add('active');
            paralyzedText.classList.add('active');

            // Reduce score
            game.score = Math.max(0, game.score - pointsLost);
            scoreValue.textContent = game.score;

            // Remove paralysis after duration
            setTimeout(() => {
                game.player.isParalyzed = false;
                paralyzedOverlay.classList.remove('active');
                paralyzedText.classList.remove('active');
            }, paralyzeDuration);
        }

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            game.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // Update player velocity based on input (only horizontal and vertical)
        function updatePlayerVelocity() {
            if (game.player.isParalyzed) {
                game.player.velocityX = 0;
                game.player.velocityY = 0;
                return;
            }

            let newVelocityX = 0;
            let newVelocityY = 0;

            if (game.keys['ArrowUp'] || game.keys['w'] || game.keys['W']) {
                newVelocityY = -1;
            }
            if (game.keys['ArrowDown'] || game.keys['s'] || game.keys['S']) {
                newVelocityY = 1;
            }
            if (game.keys['ArrowLeft'] || game.keys['a'] || game.keys['A']) {
                newVelocityX = -1;
            }
            if (game.keys['ArrowRight'] || game.keys['d'] || game.keys['D']) {
                newVelocityX = 1;
            }

            game.player.velocityX = newVelocityX;
            game.player.velocityY = newVelocityY;
        }

        // Game update loop
        let lastFrameTime = Date.now();
        let primosgemSpawnTime = Date.now();
        let targetingMeteor1SpawnTime = Date.now();
        let targetingMeteor2SpawnTime = Date.now();
        let randomMeteor1SpawnTime = Date.now();
        let randomMeteor2SpawnTime = Date.now();

        function update() {
            const currentTime = Date.now();
            const deltaTime = (currentTime - lastFrameTime) / 1000; // Convert to seconds
            lastFrameTime = currentTime;

            // Update player velocity based on input
            updatePlayerVelocity();

            // Move player
            const moveDistance = PLAYER_SPEED * deltaTime;
            game.player.gridX += game.player.velocityX * moveDistance;
            game.player.gridY += game.player.velocityY * moveDistance;

            // Clamp player position to grid
            game.player.gridX = Math.max(0, Math.min(GRID_SIZE - 1, game.player.gridX));
            game.player.gridY = Math.max(0, Math.min(GRID_SIZE - 1, game.player.gridY));

            // Update player display
            updatePlayerDisplay();

            // Check primogem collision
            checkPrimosgemCollision();

            // Spawn primogems
            if (currentTime - primosgemSpawnTime >= PRIMOGEM_SPAWN_INTERVAL) {
                spawnPrimogem();
                primosgemSpawnTime = currentTime;
            }

            // Spawn targeting meteors (lock onto player)
            const targetingInterval = getTargetingMeteorInterval();
            if (game.activeMeteorSpawners.targeting1 && currentTime - targetingMeteor1SpawnTime >= targetingInterval) {
                spawnTargetingMeteor();
                targetingMeteor1SpawnTime = currentTime;
            }

            // Spawn second targeting meteor
            if (game.activeMeteorSpawners.targeting2 && currentTime - targetingMeteor2SpawnTime >= targetingInterval) {
                spawnTargetingMeteor();
                targetingMeteor2SpawnTime = currentTime;
            }

            // Spawn random meteors
            const randomInterval = getRandomMeteorInterval();
            if (game.activeMeteorSpawners.random1 && currentTime - randomMeteor1SpawnTime >= randomInterval) {
                spawnRandomMeteor();
                randomMeteor1SpawnTime = currentTime;
            }

            // Spawn second random meteor
            if (game.activeMeteorSpawners.random2 && currentTime - randomMeteor2SpawnTime >= randomInterval) {
                spawnRandomMeteor();
                randomMeteor2SpawnTime = currentTime;
            }

            requestAnimationFrame(update);
        }

        // Initialize game
        function init() {
            createGrid();
            updatePlayerDisplay();
            update();

            // Spawn first primogem and meteor after a short delay
            setTimeout(() => {
                spawnPrimogem();
            }, 1000);

            setTimeout(() => {
                spawnTargetingMeteor();
            }, 2000);

            setTimeout(() => {
                spawnRandomMeteor();
            }, 5000);
        }

        init();
    </script>
</body>
</html>
